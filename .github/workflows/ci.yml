name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
