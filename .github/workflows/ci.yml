name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: TUTORIAL GEN
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Validar secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Secret GEMINI_API_KEY ausente"; exit 1;
          fi
      - name: Criar .env.local
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          printf "GEMINI_API_KEY=%s\n" "$GEMINI_API_KEY" > .env.local
          echo "::add-mask::$GEMINI_API_KEY"
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
