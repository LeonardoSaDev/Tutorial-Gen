name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: TUTORIAL GEN
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Status do secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "SECRET_STATUS=AVAILABLE" >> "$GITHUB_ENV"
            echo "::add-mask::$GEMINI_API_KEY"
          else
            echo "SECRET_STATUS=MISSING_OR_INACCESSIBLE" >> "$GITHUB_ENV"
          fi
      - name: Validar secret (apenas push/dispatch)
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          test -n "$GEMINI_API_KEY" || (echo "Secret GEMINI_API_KEY ausente"; exit 1)
      - name: Criar .env.local (com secret)
        if: ${{ env.SECRET_STATUS == 'AVAILABLE' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          printf "GEMINI_API_KEY=%s\n" "$GEMINI_API_KEY" > .env.local
          echo "::add-mask::$GEMINI_API_KEY"
      - name: Criar .env.local (sem secret - placeholder)
        if: ${{ env.SECRET_STATUS != 'AVAILABLE' }}
        run: |
          printf "GEMINI_API_KEY=\n" > .env.local
          echo "Usando placeholder: secret indisponível no contexto atual"
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
